<svg width="820" height="510" viewBox="0 0 820 510" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code','Cascadia Code','Courier New',monospace">
  <defs>
    <!-- Window gradient -->
    <linearGradient id="winBg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0b0018"/>
      <stop offset="100%" stop-color="#12001f"/>
    </linearGradient>
    <!-- Title bar gradient -->
    <linearGradient id="titleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c0033"/>
      <stop offset="50%" stop-color="#200038"/>
      <stop offset="100%" stop-color="#1c0033"/>
    </linearGradient>
    <!-- Skill bar gradients -->
    <linearGradient id="barC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#f72585"/>
    </linearGradient>
    <linearGradient id="barRust" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffbe0b"/>
    </linearGradient>
    <linearGradient id="barPy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#00f5d4"/>
    </linearGradient>
    <linearGradient id="barBash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#aaff00"/>
      <stop offset="100%" stop-color="#00f5d4"/>
    </linearGradient>
    <!-- Section box background -->
    <linearGradient id="boxBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0030" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#150026" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      .cur { animation: blink 1.1s step-start infinite; }
    </style>
  </defs>

  <!-- ═══════════════════════ WINDOW ═══════════════════════ -->
  <!-- Outer glow -->
  <rect x="2" y="2" width="816" height="506" rx="14" fill="none" stroke="#7b2fff" stroke-width="2" opacity="0.25"/>
  <!-- Main window -->
  <rect width="820" height="510" rx="13" fill="url(#winBg)"/>
  <!-- Inner border -->
  <rect x="0.5" y="0.5" width="819" height="509" rx="13" fill="none" stroke="#3d0066" stroke-width="1"/>

  <!-- ═══════════════════════ TITLE BAR ═══════════════════════ -->
  <rect width="820" height="46" rx="13" fill="url(#titleBar)"/>
  <rect y="34" width="820" height="12" fill="#200038"/>
  <line x1="0" y1="46" x2="820" y2="46" stroke="#4a0080" stroke-width="1" opacity="0.7"/>
  <!-- Traffic lights -->
  <circle cx="30" cy="23" r="7" fill="#ff5f57"/>
  <circle cx="54" cy="23" r="7" fill="#febc2e"/>
  <circle cx="78" cy="23" r="7" fill="#28c840"/>
  <!-- Window title -->
  <text x="410" y="28" text-anchor="middle" font-size="12.5" fill="#9d4edd" letter-spacing="0.5">sysitn@github — fish — ~/profile</text>

  <!-- ═══════════════════════ LINE 1: PROMPT ═══════════════════════ -->
  <text y="74" font-size="13.5" font-weight="bold">
    <tspan x="30" fill="#00f5d4" filter="url(#glow)">sysitn</tspan><tspan fill="#5c0099">@</tspan><tspan fill="#f72585" filter="url(#glow)">github</tspan>
    <tspan fill="#6a0dad"> ~/profile </tspan>
    <tspan fill="#c77dff">❯ </tspan>
    <tspan fill="#aaff00" filter="url(#glowSoft)">neofetch</tspan>
  </text>
  <!-- Separator -->
  <line x1="30" y1="84" x2="790" y2="84" stroke="#2d0050" stroke-width="1"/>

  <!-- ═══════════════════════ NEOFETCH BLOCK ═══════════════════════ -->

  <!-- LEFT: ASCII "S" logo with neon colors -->
  <text x="36" y="109" font-size="14" font-weight="bold" fill="#f72585" filter="url(#glow)">████████████</text>
  <text x="36" y="129" font-size="14" font-weight="bold" fill="#d4006c">██</text>
  <text x="36" y="149" font-size="14" font-weight="bold" fill="#9d4edd" filter="url(#glow)">██████████</text>
  <text x="36" y="169" font-size="14" font-weight="bold" fill="#7b2fff">          ██</text>
  <text x="36" y="189" font-size="14" font-weight="bold" fill="#c77dff" filter="url(#glow)">████████████</text>

  <!-- Color swatches row -->
  <rect x="36"  y="202" width="16" height="14" rx="2" fill="#0b0018"/>
  <rect x="56"  y="202" width="16" height="14" rx="2" fill="#7b2fff"/>
  <rect x="76"  y="202" width="16" height="14" rx="2" fill="#f72585"/>
  <rect x="96"  y="202" width="16" height="14" rx="2" fill="#00f5d4"/>
  <rect x="116" y="202" width="16" height="14" rx="2" fill="#aaff00"/>
  <rect x="136" y="202" width="16" height="14" rx="2" fill="#ffbe0b"/>
  <rect x="156" y="202" width="16" height="14" rx="2" fill="#3a86ff"/>
  <rect x="176" y="202" width="16" height="14" rx="2" fill="#e0aaff"/>

  <!-- RIGHT: System info -->
  <!-- Username -->
  <text font-size="13.5" font-weight="bold">
    <tspan x="230" y="109" fill="#00f5d4" filter="url(#glow)">sysitn</tspan><tspan fill="#5c0099">@</tspan><tspan fill="#f72585" filter="url(#glow)">github</tspan>
  </text>
  <!-- Thin separator -->
  <line x1="230" y1="118" x2="650" y2="118" stroke="#3d0066" stroke-width="1"/>

  <!-- Info rows -->
  <text x="230" y="137" font-size="13">
    <tspan fill="#c77dff" font-weight="bold">OS</tspan><tspan fill="#3d0066">........</tspan><tspan fill="#e0aaff">CachyOS x86_64</tspan>
  </text>
  <text x="230" y="157" font-size="13">
    <tspan fill="#c77dff" font-weight="bold">Host</tspan><tspan fill="#3d0066">......</tspan><tspan fill="#e0aaff">MSI GF63 Thin 11UD</tspan>
  </text>
  <text x="230" y="177" font-size="13">
    <tspan fill="#c77dff" font-weight="bold">Kernel</tspan><tspan fill="#3d0066">....</tspan><tspan fill="#aaff00" filter="url(#glowSoft)">Linux 7.0.1-cachyos</tspan>
  </text>
  <text x="230" y="197" font-size="13">
    <tspan fill="#c77dff" font-weight="bold">Shell</tspan><tspan fill="#3d0066">.....</tspan><tspan fill="#00f5d4" filter="url(#glowSoft)">fish 4.6.0</tspan>
  </text>
  <text x="230" y="217" font-size="13">
    <tspan fill="#c77dff" font-weight="bold">GPU</tspan><tspan fill="#3d0066">.......</tspan><tspan fill="#e0aaff">RTX 3050 Ti  +  Intel UHD</tspan>
  </text>

  <!-- Right-side extra info (second column within right panel) -->
  <text x="530" y="137" font-size="13">
    <tspan fill="#9d4edd" font-weight="bold">WM</tspan><tspan fill="#3d0066">.....</tspan><tspan fill="#e0aaff">Mutter</tspan>
  </text>
  <text x="530" y="157" font-size="13">
