  <text x="84"  y="412" text-anchor="middle" font-size="11.5" fill="#c77dff">⚙ sys programmer</text>

  <rect x="148" y="396" width="108" height="22" rx="11" fill="#1a0030" stroke="#f72585" stroke-width="1"/>
  <text x="202" y="412" text-anchor="middle" font-size="11.5" fill="#f72585">🔥 low-level addict</text>

  <rect x="266" y="396" width="90" height="22" rx="11" fill="#1a0030" stroke="#00f5d4" stroke-width="1"/>
  <text x="311" y="412" text-anchor="middle" font-size="11.5" fill="#00f5d4">🐧 linux btw</text>

  <rect x="366" y="396" width="82" height="22" rx="11" fill="#1a0030" stroke="#aaff00" stroke-width="1"/>
  <text x="407" y="412" text-anchor="middle" font-size="11.5" fill="#aaff00">🦀 rust lover</text>

  <rect x="458" y="396" width="100" height="22" rx="11" fill="#1a0030" stroke="#ffbe0b" stroke-width="1"/>
  <text x="508" y="412" text-anchor="middle" font-size="11.5" fill="#ffbe0b">⚡ kernel hacker</text>

  <rect x="568" y="396" width="98" height="22" rx="11" fill="#1a0030" stroke="#9d4edd" stroke-width="1"/>
  <text x="617" y="412" text-anchor="middle" font-size="11.5" fill="#9d4edd">☕ coffee: ∞</text>

  <!-- ═══════════════════════ FINAL PROMPT ═══════════════════════ -->
  <line x1="30" y1="428" x2="790" y2="428" stroke="#2d0050" stroke-width="1"/>

  <text y="452" font-size="13.5" font-weight="bold">
    <tspan x="30" fill="#00f5d4" filter="url(#glow)">sysitn</tspan><tspan fill="#5c0099">@</tspan><tspan fill="#f72585" filter="url(#glow)">github</tspan>
    <tspan fill="#6a0dad"> ~/profile </tspan>
    <tspan fill="#c77dff">❯ </tspan>
    <tspan fill="#e0aaff">git commit -m </tspan><tspan fill="#aaff00" filter="url(#glowSoft)">"feat: be awesome, write fast code"</tspan>
  </text>

  <text y="476" font-size="13.5" font-weight="bold">
    <tspan x="30" fill="#00f5d4" filter="url(#glow)">sysitn</tspan><tspan fill="#5c0099">@</tspan><tspan fill="#f72585" filter="url(#glow)">github</tspan>
    <tspan fill="#6a0dad"> ~/profile </tspan>
    <tspan fill="#c77dff">❯ </tspan>
    <tspan class="cur" fill="#7b2fff" filter="url(#glow)">█</tspan>
  </text>
</svg>
