  <rect x="72"  y="200" width="14" height="12" rx="3" fill="#6d28d9"/>
  <rect x="90"  y="200" width="14" height="12" rx="3" fill="#8b5cf6"/>
  <rect x="108" y="200" width="14" height="12" rx="3" fill="#a78bfa"/>
  <rect x="126" y="200" width="14" height="12" rx="3" fill="#e879a0"/>
  <rect x="144" y="200" width="14" height="12" rx="3" fill="#f9a8d4"/>
