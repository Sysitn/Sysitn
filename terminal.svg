<svg width="840" height="530" viewBox="0 0 840 530" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code','Cascadia Code','Courier New',monospace">
  <defs>

    <!-- Backgrounds -->
    <linearGradient id="winBg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="#0d0018"/>
      <stop offset="100%" stop-color="#130020"/>
    </linearGradient>
    <linearGradient id="titleBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1c0030"/>
      <stop offset="50%"  stop-color="#21003a"/>
      <stop offset="100%" stop-color="#1c0030"/>
    </linearGradient>
    <linearGradient id="boxBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1b002d" stop-opacity="1"/>
      <stop offset="100%" stop-color="#160026" stop-opacity="1"/>
    </linearGradient>

    <!-- Skill bar gradients — plum/rose palette only -->
    <linearGradient id="barVioletRose" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#e879a0"/>
    </linearGradient>
    <linearGradient id="barRose" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#db2777"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <linearGradient id="barViolet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="barMauve" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#9d4edd"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>

    <!-- Subtle glow for accents -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowFaint" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      .cur { animation: blink 1.1s step-start infinite; }
    </style>
  </defs>

  <!-- ═══ WINDOW SHELL ═══ -->
  <!-- Outer glow ring -->
  <rect x="1" y="1" width="838" height="528" rx="14" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.18"/>
