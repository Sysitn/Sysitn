  <rect width="840" height="530" rx="13" fill="url(#winBg)"/>
  <!-- Inner hairline border -->
  <rect x="0.5" y="0.5" width="839" height="529" rx="13" fill="none" stroke="#3a1060" stroke-width="1"/>

  <!-- ═══ TITLE BAR ═══ -->
