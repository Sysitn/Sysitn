  <rect x="120" y="301" width="152" height="11" rx="5" fill="url(#barRust)" opacity="0.95"/>
  <text x="280" y="312" font-size="11" fill="#ffbe0b">  advanced 🦀</text>

  <!-- Python -->
  <text x="36" y="335" font-size="12.5" fill="#e0aaff" font-weight="bold">Python </text>
  <rect x="120" y="323" width="130" height="11" rx="5" fill="#1a0030"/>
  <rect x="120" y="323" width="130" height="11" rx="5" fill="url(#barPy)" opacity="0.95"/>
  <text x="258" y="334" font-size="11" fill="#00f5d4">  proficient 🐍</text>

  <!-- Bash -->
  <text x="36" y="357" font-size="12.5" fill="#e0aaff" font-weight="bold">Bash   </text>
  <rect x="120" y="345" width="150" height="11" rx="5" fill="#1a0030"/>
  <rect x="120" y="345" width="150" height="11" rx="5" fill="url(#barBash)" opacity="0.95"/>
  <text x="278" y="356" font-size="11" fill="#aaff00">  advanced 🐚</text>

  <!-- RIGHT skills column: OS/Tools -->
  <!-- Linux -->
  <text x="430" y="291" font-size="12.5" fill="#e0aaff" font-weight="bold">Linux  </text>
  <rect x="514" y="279" width="164" height="11" rx="5" fill="#1a0030"/>
  <rect x="514" y="279" width="164" height="11" rx="5" fill="url(#barC)" opacity="0.85"/>
  <text x="686" y="290" font-size="11" fill="#f72585" filter="url(#glowSoft)">  native 🐧</text>

  <!-- GDB -->
  <text x="430" y="313" font-size="12.5" fill="#e0aaff" font-weight="bold">GDB    </text>
  <rect x="514" y="301" width="130" height="11" rx="5" fill="#1a0030"/>
  <rect x="514" y="301" width="130" height="11" rx="5" fill="url(#barRust)" opacity="0.85"/>
  <text x="652" y="312" font-size="11" fill="#ffbe0b">  debug wizard</text>

  <!-- CMake -->
  <text x="430" y="335" font-size="12.5" fill="#e0aaff" font-weight="bold">CMake  </text>
  <rect x="514" y="323" width="120" height="11" rx="5" fill="#1a0030"/>
  <rect x="514" y="323" width="120" height="11" rx="5" fill="url(#barPy)" opacity="0.85"/>
  <text x="642" y="334" font-size="11" fill="#00f5d4">  proficient</text>

  <!-- Git -->
  <text x="430" y="357" font-size="12.5" fill="#e0aaff" font-weight="bold">Git    </text>
  <rect x="514" y="345" width="140" height="11" rx="5" fill="#1a0030"/>
  <rect x="514" y="345" width="140" height="11" rx="5" fill="url(#barBash)" opacity="0.85"/>
  <text x="662" y="356" font-size="11" fill="#aaff00">  advanced</text>

  <!-- ═══════════════════════ STATUS SECTION ═══════════════════════ -->
  <line x1="30" y1="386" x2="790" y2="386" stroke="#2d0050" stroke-width="1"/>

