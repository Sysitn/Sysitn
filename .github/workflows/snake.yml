name: 🐍 Purple Snake

on:
  schedule:
    - cron: "0 */6 * * *"   # каждые 6 часов
  workflow_dispatch:          # запуск вручную
  push:
    branches: [main]

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🐍 Generate Snake (Purple Edition)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-light.svg
            dist/snake-dark.svg?palette=github-dark&color_snake=#c77dff&color_dot_empty=#1a0033&color_dot_small=#3d0066&color_dot_medium=#6a0dad&color_dot_large=#9d4edd&color_dot_xlarge=#e0aaff

      - name: 🚀 Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
